after-login-command = []

after-startup-command = []

exec-on-workspace-change = []

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 100

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = 10
outer.right = 10

[mode.main.binding]

alt-ctrl-shift-z = 'fullscreen'
alt-ctrl-shift-q = 'layout floating'

cmd-alt-ctrl-shift-t = 'layout tiles horizontal vertical'
cmd-alt-ctrl-shift-v = 'layout accordion horizontal vertical'

alt-ctrl-shift-h = 'focus left'
alt-ctrl-shift-j = 'focus down'
alt-ctrl-shift-k = 'focus up'
alt-ctrl-shift-l = 'focus right'

cmd-alt-ctrl-shift-h = 'move left'
cmd-alt-ctrl-shift-j = 'move down'
cmd-alt-ctrl-shift-k = 'move up'
cmd-alt-ctrl-shift-l = 'move right'

cmd-alt-ctrl-shift-minus = 'resize smart -50'
cmd-alt-ctrl-shift-equal = 'resize smart +50'

alt-ctrl-shift-b = 'workspace 1'
alt-ctrl-shift-y = 'workspace 2'
alt-ctrl-shift-o = 'workspace 3'
alt-ctrl-shift-u = 'workspace 4'
alt-ctrl-shift-c = 'workspace 5'
alt-ctrl-shift-i = 'workspace 6'
alt-ctrl-shift-e = 'workspace 7'
alt-ctrl-shift-a = 'workspace 8'

cmd-alt-ctrl-shift-b = 'move-node-to-workspace 1 --focus-follows-window'
cmd-alt-ctrl-shift-y = 'move-node-to-workspace 2 --focus-follows-window'
cmd-alt-ctrl-shift-o = 'move-node-to-workspace 3 --focus-follows-window'
cmd-alt-ctrl-shift-u = 'move-node-to-workspace 4 --focus-follows-window'
cmd-alt-ctrl-shift-c = 'move-node-to-workspace 5 --focus-follows-window'
cmd-alt-ctrl-shift-i = 'move-node-to-workspace 6 --focus-follows-window'
cmd-alt-ctrl-shift-e = 'move-node-to-workspace 7 --focus-follows-window'
cmd-alt-ctrl-shift-a = 'move-node-to-workspace 8 --focus-follows-window'

alt-tab = 'workspace-back-and-forth'
alt-ctrl-tab = 'move-workspace-to-monitor --wrap-around next'

alt-ctrl-shift-semicolon = 'mode service'
alt-ctrl-shift-comma = 'mode apps'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

[mode.apps.binding]
t = ['exec-and-forget open /Applications/Ghostty.app', 'mode main']
b = ['exec-and-forget open "/Applications/Brave Browser.app"', 'mode main']
s = [
  'exec-and-forget open "/System/Applications/System Settings.app"',
  'mode main',
]
m = ['exec-and-forget open "/System/Applications/Mail.app"', 'mode main']
c = ['exec-and-forget open "/Applications/Signal.app"', 'mode main']
v = ['exec-and-forget open "/Applications/Visual Studio Code.app"', 'mode main']
z = ['exec-and-forget open "/Applications/Zed.app"', 'mode main']


[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace 8'

[[on-window-detected]]
if.app-id = 'ch.protonmail.desktop'
run = 'move-node-to-workspace 8'

[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'me.proton.pass.electron'
run = 'layout floating'
